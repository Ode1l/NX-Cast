<svg xmlns="http://www.w3.org/2000/svg"
     width="984"
     height="528"
     viewBox="9 28 82 44"
     fill="none"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-labelledby="title description">
  <title id="title">Switch screencast logo</title>
  <desc id="description">Cyan and coral Joy-Con controllers surrounding a standalone screencast mark.</desc>

  <defs>
    <!--
      The mark follows the third 424x322 reference. All terminals and corners
      are square, and the cast waves are filled quarter-ring shapes.
    -->
    <g id="screencast-mark">
      <path fill="currentColor"
            d="M39 88V30h321v248H225v-20h115V50H59v38H39Z"/>
      <g id="cast-waves" transform="translate(4 -4)">
        <path fill="currentColor"
              d="M39 127a151 151 0 0 1 151 151h-26A125 125 0 0 0 39 153v-26Z"/>
        <path fill="currentColor"
              d="M39 182a96 96 0 0 1 96 96h-26a70 70 0 0 0-70-70v-26Z"/>
        <path fill="currentColor"
              d="M39 238a40 40 0 0 1 40 40H39v-40Z"/>
      </g>
    </g>

  </defs>

  <!-- Left Joy-Con -->
  <g id="left-controller" transform="translate(5.8)">
    <path id="left-controller-shell"
          fill="#050505"
          d="M17.8 30.4h-4.3c-4.6 0-8.6 3.4-8.6 8V61c0 4.6 4 8.6 8.6 8.6h4.3V30.4Z"/>
    <path fill="#00BDDE"
          d="M17 68.9h-3.5c-4.2 0-7.8-3.7-7.8-7.8V38.4c0-2 .8-3.8 2.3-5.2 1.5-1.3 3.4-2.1 5.5-2.1H17v37.8Z"/>
    <g fill="#050505">
      <circle cx="8.7" cy="51.2" r="1.5"/>
      <circle cx="14.8" cy="51.2" r="1.5"/>
      <circle cx="11.8" cy="48.1" r="1.5"/>
      <circle cx="11.8" cy="40.3" r="3.3"/>
      <circle cx="11.8" cy="54.3" r="1.5"/>
      <rect x="12.7" y="57.4" width="2.4" height="2.3" rx=".25"/>
    </g>
  </g>

  <!-- The center is transparent; only the proportional cast mark remains. -->
  <use id="center-screencast-logo"
       href="#screencast-mark"
       transform="translate(18.465 25.658) scale(.1580645)"
       color="#050505"/>

  <!-- Right Joy-Con -->
  <g id="right-controller" transform="translate(-5.8)">
    <path id="right-controller-shell"
          fill="#050505"
          d="M82.2 30.4h4.3c4.6 0 8.6 3.4 8.6 8V61c0 4.6-4 8.6-8.6 8.6h-4.3V30.4Z"/>
    <path fill="#FF5F52"
          d="M94.3 61c0 4.2-3.6 7.8-7.8 7.8H83V31.1h3.5c2.1 0 4 .7 5.5 2.1 1.5 1.4 2.3 3.2 2.3 5.2V61Z"/>
    <g fill="#050505">
      <circle cx="91.7" cy="40.2" r="1.5"/>
      <circle cx="85.6" cy="40.2" r="1.5"/>
      <circle cx="88.7" cy="37.2" r="1.5"/>
      <circle cx="88.7" cy="51.5" r="3.3"/>
      <circle cx="88.7" cy="43.3" r="1.5"/>
      <circle cx="86.6" cy="58.7" r="1.6"/>
    </g>
  </g>
</svg>

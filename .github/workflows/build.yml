name: build

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

env:
  NXCAST_MPV_VARIANT: deko3d
  WILIWILI_RELEASE: v0.1.0
  LIBUAM_PKG: libuam-f8c9eef01ffe06334d530393d636d69e2b52744b-1-any.pkg.tar.zst
  SWITCH_FFMPEG_PKG: switch-ffmpeg-7.1-1-any.pkg.tar.zst
  SWITCH_LIBMPV_PKG: switch-libmpv_deko3d-0.36.0-2-any.pkg.tar.zst

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test IPTV channel-list navigation
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Isource \
            scripts/test_iptv_channel_list.c \
            -o /tmp/test_iptv_channel_list
          /tmp/test_iptv_channel_list

      - name: Build project image
        run: |
          docker build \
            --build-arg NXCAST_MPV_VARIANT="${NXCAST_MPV_VARIANT}" \
            --build-arg WILIWILI_RELEASE="${WILIWILI_RELEASE}" \
            --build-arg LIBUAM_PKG="${LIBUAM_PKG}" \
            --build-arg SWITCH_FFMPEG_PKG="${SWITCH_FFMPEG_PKG}" \
            --build-arg SWITCH_LIBMPV_PKG="${SWITCH_LIBMPV_PKG}" \
            -t nx-cast-build:ci .

      - name: Build NX-Cast in devkitPro container
        run: |
          docker run --rm \
            -e DEVKITPRO=/opt/devkitpro \
            -e NXCAST_MIN_NRO_SIZE=5000000 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            nx-cast-build:ci \
            bash -lc 'set -euo pipefail; host_pc="/usr/lib/$(gcc -print-multiarch)/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig"; PKG_CONFIG_PATH="${host_pc}" make test-airplay; make RELEASE_JOBS=$(nproc) release-build'

      - name: Package SD card layout
        env:
          NXCAST_MIN_NRO_SIZE: 5000000
        run: ./scripts/package_release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nx-cast-${{ github.sha }}
          path: |
            dist/NX-Cast.nro
            dist/NX-Cast-sdmc.zip
          if-no-files-found: error

      - name: Update continuous GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        env:
          GH_TOKEN: ${{ github.token }}
          CONTINUOUS_TAG: continuous
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${CONTINUOUS_TAG}" "${GITHUB_SHA}"
          git push -f origin "refs/tags/${CONTINUOUS_TAG}"

          notes_file="$(mktemp)"
          cat .github/release-notes.md > "${notes_file}"
          printf '\n\n## Continuous Build\n\nAutomatic development build from `%s` at `%s`.\n' \
            "${GITHUB_REF_NAME}" "${GITHUB_SHA}" >> "${notes_file}"
          if gh release view "${CONTINUOUS_TAG}" >/dev/null 2>&1; then
            gh release upload "${CONTINUOUS_TAG}" \
              dist/NX-Cast.nro \
              dist/NX-Cast-sdmc.zip \
              --clobber
            gh release edit "${CONTINUOUS_TAG}" \
              --title "NX-Cast Continuous" \
              --notes-file "${notes_file}" \
              --prerelease
          else
            gh release create "${CONTINUOUS_TAG}" \
              dist/NX-Cast.nro \
              dist/NX-Cast-sdmc.zip \
              --title "NX-Cast Continuous" \
              --notes-file "${notes_file}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NXCAST_MPV_VARIANT: deko3d
  WILIWILI_RELEASE: v0.1.0
  LIBUAM_PKG: libuam-f8c9eef01ffe06334d530393d636d69e2b52744b-1-any.pkg.tar.zst
  SWITCH_FFMPEG_PKG: switch-ffmpeg-7.1-1-any.pkg.tar.zst
  SWITCH_LIBMPV_PKG: switch-libmpv_deko3d-0.36.0-2-any.pkg.tar.zst

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build project image
        run: |
          docker build \
            --build-arg NXCAST_MPV_VARIANT="${NXCAST_MPV_VARIANT}" \
            --build-arg WILIWILI_RELEASE="${WILIWILI_RELEASE}" \
            --build-arg LIBUAM_PKG="${LIBUAM_PKG}" \
            --build-arg SWITCH_FFMPEG_PKG="${SWITCH_FFMPEG_PKG}" \
            --build-arg SWITCH_LIBMPV_PKG="${SWITCH_LIBMPV_PKG}" \
            -t nx-cast-build:ci .

      - name: Build NX-Cast in devkitPro container
        run: |
          docker run --rm \
            -e DEVKITPRO=/opt/devkitpro \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            nx-cast-build:ci \
            bash -lc 'make clean && make -j$(nproc)'

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            NX-Cast.nro
